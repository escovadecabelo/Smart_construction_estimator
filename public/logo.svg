<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- House Base & Roof -->
  <path d="M50 450V270L200 120L350 270V450" stroke="#0091D5" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Horizontal extensions at bottom -->
  <path d="M50 450H10" stroke="#0091D5" stroke-width="40" stroke-linecap="round"/>
  <path d="M350 450H390" stroke="#0091D5" stroke-width="40" stroke-linecap="round"/>
  
  <!-- Cleaning Tool (Mop/Head) -->
  <path d="M200 120L60 20" stroke="#0091D5" stroke-width="30" stroke-linecap="round"/>
  <rect x="50" y="20" width="120" height="40" rx="20" transform="rotate(-35 50 20)" fill="#0091D5"/>
  <rect x="70" y="35" width="60" height="10" rx="5" transform="rotate(-35 70 35)" fill="white"/>

  <!-- Window (4 squares) -->
  <rect x="150" y="280" width="40" height="40" rx="8" fill="#0091D5"/>
  <rect x="210" y="280" width="40" height="40" rx="8" fill="#0091D5"/>
  <rect x="150" y="340" width="40" height="40" rx="8" fill="#0091D5"/>
  <rect x="210" y="340" width="40" height="40" rx="8" fill="#0091D5"/>
  
  <!-- Sparkle/Shine -->
  <path d="M90 200C90 200 110 220 130 200C130 200 110 180 90 200Z" fill="#0091D5"/>
  <path d="M110 180C110 180 130 200 110 220C110 220 90 200 110 180Z" fill="#0091D5"/>
</svg>
